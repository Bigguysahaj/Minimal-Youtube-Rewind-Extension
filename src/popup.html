<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>YouTube Rewind</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 280px;
        background: #0f0f0f;
        color: #f1f1f1;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 20px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
      }

      .logo {
        width: 28px;
        height: 28px;
        background: #ff0000;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .logo svg {
        width: 16px;
        height: 16px;
        fill: white;
      }

      .header-text h1 {
        font-size: 13px;
        font-weight: 600;
        color: #f1f1f1;
        letter-spacing: 0.01em;
      }

      .header-text p {
        font-size: 10px;
        color: #717171;
        margin-top: 1px;
      }

      .divider {
        height: 1px;
        background: #272727;
        margin-bottom: 16px;
      }

      .shortcuts {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .shortcut {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .shortcut-label {
        font-size: 11px;
        color: #aaa;
        flex: 1;
        line-height: 1.4;
      }

      .keys {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }

      .key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 3px 8px;
        background: #1e1e1e;
        border: 1px solid #333;
        border-bottom: 2px solid #444;
        border-radius: 5px;
        font-size: 10px;
        font-weight: 600;
        color: #e0e0e0;
        letter-spacing: 0.03em;
        font-family: inherit;
        white-space: nowrap;
      }

      .plus {
        font-size: 10px;
        color: #555;
      }

      .action-tag {
        font-size: 9px;
        font-weight: 600;
        color: #ff4444;
        background: rgba(255, 68, 68, 0.1);
        border: 1px solid rgba(255, 68, 68, 0.2);
        border-radius: 4px;
        padding: 1px 5px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>YouTube Rewind</h1>
        <p>Rewind with 1 second precision</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="shortcuts">
      <div class="shortcut">
        <span class="shortcut-label">Step back 1 second</span>
        <div class="keys">
          <span class="key">Shift</span>
          <span class="plus">+</span>
          <span class="key">Space</span>
        </div>
        <span class="action-tag">tap</span>
      </div>
      <div class="shortcut">
        <span class="shortcut-label">Rewind at 2× speed</span>
        <div class="keys">
          <span class="key">Shift</span>
          <span class="plus">+</span>
          <span class="key">Space</span>
        </div>
        <span class="action-tag">hold</span>
      </div>
    </div>
  </body>
</html>
